services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/pitchsync
      - JWT_SECRET=${JWT_SECRET:-pitchsync-dev-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-pitchsync-refresh-secret}
      - CORS_ORIGINS=http://localhost:5174
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - ./backend/src:/app/src
    command: node --watch src/index.js
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  mongo_data:
